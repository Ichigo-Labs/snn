# CPU-side verification matrix. Hosted runners have no GPU, so the CUDA
# *runtime* configurations (build-omp tests, the CUDA coverage gate, CPU/GPU
# parity, compute-sanitizer) remain a local pre-push gate — see README
# "Coverage". The cuda-compile job below still nvcc-compiles the backend so
# a .cu build break cannot land green.
name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  tests:
    name: tests (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: serial
            flags: ""
          - name: openmp
            flags: -DSNN_ENABLE_OPENMP=ON
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DSNN_ENABLE_CUDA=OFF ${{ matrix.flags }}
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure

  cuda-compile:
    name: cuda compile (no GPU)
    # 22.04's apt toolkit (CUDA 11.5) matches its default gcc-11 host compiler.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install CUDA toolkit
        run: sudo apt-get update && sudo apt-get install -y nvidia-cuda-toolkit
      - name: Configure
        run: cmake -S . -B build -DSNN_ENABLE_CUDA=ON
      - name: Build
        run: cmake --build build -j
      - name: Test (no device; exercises the unavailable paths)
        run: ctest --test-dir build --output-on-failure

  production:
    name: production config (hooks off) + benchmarks + examples + tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Python research and production tools parse
        run: |
          python3 - <<'PY'
          from pathlib import Path
          paths = (
              Path("tools/snn_meta_optimizer.py"),
              Path("tools/snn_production.py"),
              Path("tools/snn_production_support.py"),
          )
          for path in paths:
              compile(path.read_bytes(), str(path), "exec")
          PY
      - name: Install zlib (the MNIST trainer reads idx.gz directly)
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev
      - name: Configure
        run: >
          cmake -S . -B build -DSNN_ENABLE_CUDA=OFF -DSNN_BUILD_TESTS=OFF
          -DSNN_BUILD_BENCHMARKS=ON -DSNN_BUILD_EXAMPLES=ON -DSNN_BUILD_TOOLS=ON
      - name: Build
        run: cmake --build build -j
      - name: Run example
        run: ./build/minimal
      - name: Train one short epoch on the committed MNIST
        run: >
          ./build/mnist_bptt --mode single --hidden 64 --timesteps 5 --epochs 1
          --train 2000 --test 1000 --threads 2

  coverage:
    name: coverage gate (100%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DSNN_ENABLE_CUDA=OFF -DSNN_ENABLE_COVERAGE=ON
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Enforce 100% line coverage
        run: python3 scripts/coverage.py build 100

  sanitizers:
    name: asan+ubsan (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: serial
            flags: ""
          - name: openmp
            flags: -DSNN_ENABLE_OPENMP=ON
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: >
          cmake -S . -B build -DSNN_ENABLE_CUDA=OFF ${{ matrix.flags }}
          -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -g"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ASAN_OPTIONS=detect_leaks=1 ctest --test-dir build --output-on-failure

  tsan:
    name: tsan (openmp)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang + libomp
        run: sudo apt-get update && sudo apt-get install -y clang libomp-dev
      - name: Configure
        run: >
          cmake -S . -B build -DSNN_ENABLE_CUDA=OFF -DSNN_ENABLE_OPENMP=ON
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_C_FLAGS="-fsanitize=thread -g"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread"
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: >
          TSAN_OPTIONS="suppressions=$PWD/scripts/tsan.supp"
          ctest --test-dir build --output-on-failure

  fuzz:
    name: fuzz smoke (libFuzzer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Persist the corpus so each run deepens coverage instead of
      # rediscovering structured inputs from scratch.
      - name: Restore fuzz corpus
        uses: actions/cache@v4
        with:
          path: corpus
          key: fuzz-corpus-${{ github.run_id }}
          restore-keys: fuzz-corpus-
      - name: Build fuzz target
        run: >
          clang -std=c99 -O1 -g -fsanitize=fuzzer,address,undefined
          -fno-sanitize-recover=all -Iinclude -Isrc
          src/snn.c src/snn_cuda_stub.c fuzz/fuzz_api.c -lm -o fuzz_api
      - name: Run coverage-guided smoke
        run: |
          mkdir -p corpus
          ASAN_OPTIONS=detect_leaks=1 ./fuzz_api corpus -runs=200000 -max_len=768 -print_final_stats=1
